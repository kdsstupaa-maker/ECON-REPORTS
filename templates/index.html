<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>경제/금융 보고서 대시보드</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <h1><span>경제 금융</span> Reports</h1>
        <p style="color: var(--text-muted); font-size: 14px; margin-top: 10px;">최근 영업일 기준 48시간 내 업데이트된 주요 기관 보고서</p>
    </header>

    <div class="container">
        <div id="report-container" style="padding-bottom: 50px;">
            <!-- Reports will be injected here -->
        </div>
    </div>

    <script>
        async function fetchReports() {
            try {
                const response = await fetch('/api/reports');
                const reports = await response.json();
                const container = document.getElementById('report-container');
                
                if (reports.length === 0) {
                    container.innerHTML = '<div class="empty-state">최근 영업일 기준 48시간 내에 업데이트된 보고서가 없습니다.</div>';
                    return;
                }

                // 제목 기준으로 중복 제거 (가장 처음 나오는 파일만 표시)
                const uniqueReports = [];
                const titleSet = new Set();
                
                reports.forEach(r => {
                    // 괄호나 하이픈 등 부가 설명이 붙은 유사 제목도 하나의 게시글로 취급하기 위해 
                    // 핵심 제목만 잘라서 비교할 수도 있지만, 일단은 정확한 title 기준으로 중복 제거
                    const baseTitle = r.title.split(' - ')[0]; // scraper.py 에서 - 로 첨부파일명을 붙인 경우 원제목 추출
                    if (!titleSet.has(baseTitle)) {
                        titleSet.add(baseTitle);
                        uniqueReports.push(r);
                    }
                });

                // 모든 기관을 기본 키로 세팅하여 빈 카테고리도 표시되도록 함
                const grouped = {
                    '한국은행': [],
                    '국제금융센터': [],
                    '산업연구원': [],
                    'KDI': [],
                    '금융감독원': [],
                    'IMF': []
                };

                uniqueReports.forEach(r => {
                    if(grouped[r.institution] !== undefined) {
                        grouped[r.institution].push(r);
                    } else {
                        grouped[r.institution] = [r]; // 만약 예상치 못한 기관이 있다면 추가
                    }
                });

                container.innerHTML = '';

                for (const [inst, instReports] of Object.entries(grouped)) {
                    const title = document.createElement('h2');
                    title.className = 'inst-section-title';
                    title.textContent = inst;
                    container.appendChild(title);

                    if (instReports.length === 0) {
                        const emptyMsg = document.createElement('div');
                        emptyMsg.style.color = 'var(--text-muted)';
                        emptyMsg.style.padding = '20px 0';
                        emptyMsg.style.gridColumn = '1 / -1';
                        emptyMsg.textContent = '최근 영업일 기준 48시간 내에 업데이트된 보고서가 없습니다.';
                        container.appendChild(emptyMsg);
                        continue;
                    }

                    const subGrid = document.createElement('div');
                    subGrid.className = 'inst-sub-grid';

                    instReports.forEach(report => {
                        const card = document.createElement('div');
                        card.className = 'report-card';
                        
                        const fileType = report.type || 'PDF';
                        const linkHref = report.filename ? `/pdfs/${report.filename}` : report.url;
                        const btnText = report.filename ? `${fileType} 보기` : `원문 보기`;
                        const downloadAttr = report.filename ? `download="${report.filename}"` : '';
                        
                        card.innerHTML = `
                            <h3 class="report-title">${report.title}</h3>
                            <div class="report-meta">
                                <span class="date">${report.date}</span>
                                <a href="${linkHref}" class="download-btn" target="_blank" ${downloadAttr}>${btnText}</a>
                            </div>
                        `;
                        subGrid.appendChild(card);
                    });
                    
                    container.appendChild(subGrid);
                }
            } catch (error) {
                console.error('Error fetching reports:', error);
                document.getElementById('report-container').innerHTML = '<div class="empty-state">데이터를 불러오는 중 오류가 발생했습니다.</div>';
            }
        }

        fetchReports();
    </script>
</body>
</html>
